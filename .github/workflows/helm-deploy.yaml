# .github/workflows/helm-deploy.yml
name: Helm Deploy

on:
  workflow_dispatch:
    inputs:
      release:
        { description: "Helm release name", required: false, default: "hello" }
      namespace:
        { description: "K8s namespace", required: false, default: "hello" }
      chart_path:
        {
          description: "Chart path",
          required: false,
          default: ".github/workflows/helm/hello-chart",
        }
      values_file:
        {
          description: "Values file",
          required: false,
          default: ".github/workflows/helm/hello-chart/values.yaml",
        }
      environment:
        description: Environment
        required: true
        default: des
        type: choice
        options:
          - des
          - tqs
          - prd

permissions:
  id-token: write
  contents: read

env:
  WORKING_DIRECTORY: tf_infra
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: "helm-${{ github.ref }}-${{ inputs.namespace || vars.HELM_NAMESPACE || 'hello' }}"
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"
          terraform_wrapper: false

      - name: Generate backend.hcl from template
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          sed \
            -e 's|${project}|${{ vars.TF_PROJECT }}|g' \
            -e 's|${environment}|${{ inputs.environment }}|g' \
            -e 's|${subscription}|${{ vars.ARM_SUBSCRIPTION_ID }}|g' \
            backend.conf.tpl > backend.hcl

      - name: Read TF outputs (no plan/apply)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set -euo pipefail
          terraform init -reconfigure -backend-config=backend.hcl
          # Fail fast if the workspace does not exist — do not silently create it
          if ! terraform workspace list | grep -qw "${{ inputs.environment }}"; then
            echo "Error: Terraform workspace '${{ inputs.environment }}' does not exist. Run tf-infra.yml plan/apply first." >&2
            exit 1
          fi
          terraform workspace select ${{ inputs.environment }}
          echo "AZURE_RESOURCE_GROUP=$(terraform output -raw resource_group_name)" >> "$GITHUB_ENV"
          echo "AKS_CLUSTER_NAME=$(terraform output -raw aks_name)" >> "$GITHUB_ENV"

      - name: Show values (sanity check)
        run: |
          echo "RG=$AZURE_RESOURCE_GROUP"
          echo "AKS=$AKS_CLUSTER_NAME"

      - name: Set AKS context
        run: |
          az aks get-credentials \
            -g "$AZURE_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl config current-context
          kubectl get nodes

      - name: Helm version
        run: helm version

      - name: Helm lint
        run: |
          CHART_PATH="${{ inputs.chart_path || vars.HELM_CHART_PATH || '.github/workflows/helm/hello-chart' }}"
          helm lint "$CHART_PATH"

      - name: Helm upgrade/install
        run: |
          set -euo pipefail
          RELEASE="${{ inputs.release     || vars.HELM_RELEASE     || 'hello' }}"
          NAMESPACE="${{ inputs.namespace || vars.HELM_NAMESPACE   || 'hello' }}"
          CHART_PATH="${{ inputs.chart_path || vars.HELM_CHART_PATH || '.github/workflows/helm/hello-chart' }}"
          VALUES_FILE="${{ inputs.values_file || vars.HELM_VALUES_FILE || '.github/workflows/helm/hello-chart/values.yaml' }}"

          # ensure namespace exists
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          helm upgrade --install "$RELEASE" "$CHART_PATH" \
            --namespace "$NAMESPACE" \
            -f "$VALUES_FILE"